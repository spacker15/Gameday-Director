
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LeagueOps Live v8</title>
<link rel="stylesheet" href="styles.css">
<script src="data-model.js"></script>
<script src="scheduler.js"></script>
<script src="board.js"></script>
</head>

<body onload="initApp()">

<header>
<h1>LeagueOps Live – Game Day Command Center</h1>
<nav>
<button onclick="showTab('dashboard')">Dashboard</button>
<button onclick="showTab('board')">Schedule Board</button>
</nav>
</header>

<section id="dashboard" class="tab">
<h2>Game Day Status</h2>
<div id="statusPanel"></div>
</section>

<section id="board" class="tab">
<h2>Field Schedule</h2>
<div id="boardContainer"></div>
</section>

<script>

function initApp(){
showTab('dashboard')
renderDashboard()
renderBoard()
}

function showTab(tab){
document.querySelectorAll('.tab').forEach(t=>t.style.display='none')
document.getElementById(tab).style.display='block'
}

function renderDashboard(){

const games = LeagueDB.games

const counts = {
Scheduled:0,
Starting:0,
Live:0,
Halftime:0,
Final:0,
Delayed:0
}

games.forEach(g=>{
counts[g.status] = (counts[g.status] || 0) + 1
})

document.getElementById("statusPanel").innerHTML = `
Scheduled: ${counts.Scheduled}<br>
Starting: ${counts.Starting}<br>
Live: ${counts.Live}<br>
Halftime: ${counts.Halftime}<br>
Final: ${counts.Final}<br>
Delayed: ${counts.Delayed}
`
}

</script>

</body>
</html>
