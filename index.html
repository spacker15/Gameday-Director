
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LeagueOps Live v9</title>
<link rel="stylesheet" href="styles.css">
<script defer src="app.js"></script>
</head>
<body>

<header class="topbar">
<h1>LeagueOps Live v9</h1>
<div>Uploads • Rosters • Check‑In • Scheduling • Drag & Drop</div>
</header>

<nav class="tabs">
<button class="tab active" data-tab="dashboard">Dashboard</button>
<button class="tab" data-tab="schedule">Schedule</button>
<button class="tab" data-tab="rosters">Rosters</button>
<button class="tab" data-tab="checkin">Player Check‑In</button>
<button class="tab" data-tab="uploads">Uploads</button>
<button class="tab" data-tab="engine">Scheduling Engine</button>
</nav>

<main>

<section id="dashboard" class="page active">
<h2>Game Status</h2>
<div id="statusCounts"></div>
</section>

<section id="schedule" class="page">
<h2>Schedule Board</h2>
<div id="scheduleBoard"></div>
</section>

<section id="rosters" class="page">
<h2>Team Rosters</h2>
<div id="rosterDisplay"></div>
</section>

<section id="checkin" class="page">
<h2>Player Check‑In</h2>
<div id="checkinDisplay"></div>
</section>

<section id="uploads" class="page">
<h2>Upload Files</h2>
<label>Upload Rosters CSV</label>
<input type="file" id="rosterUpload">

<label>Upload Schedule CSV</label>
<input type="file" id="scheduleUpload">
</section>

<section id="engine" class="page">
<h2>Scheduling Engine</h2>
<button id="generateSchedule">Generate Schedule</button>
<div id="engineOutput"></div>
</section>

</main>

</body>
</html>
