
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lacrosse Stat Tracker</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
<h1>Girls Lacrosse Stat Tracker</h1>
<p>Multi‑School Modular Version</p>
</header>

<nav>
<button data-tab="setup">Setup</button>
<button data-tab="game">Game</button>
<button data-tab="players">Players</button>
<button data-tab="reports">Reports</button>
</nav>

<section id="setup">
<h2>Roster Import</h2>
<textarea id="roster" placeholder="number,name,position,class"></textarea>
<button id="import">Import Roster</button>
</section>

<section id="game">
<h2>Scoreboard</h2>
<div>
<button id="homePlus">+</button>
<span id="home">0</span>
</div>

<div>
<button id="awayPlus">+</button>
<span id="away">0</span>
</div>
</section>

<section id="players">
<h2>Players</h2>
<div id="grid"></div>
</section>

<section id="reports">
<h2>Game Recap</h2>
<textarea id="report"></textarea>
<button id="generate">Generate Recap</button>
</section>

<script type="module" src="modules/app.js"></script>
</body>
</html>
